<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="icons/favicon.ico" />

    <title>Access Denied</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* RESET */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* VARIABLES */
      :root {
        --primary-color: #00f5ff;
        --secondary-color: #ff006e;
        --accent-color: #8b5cf6;

        --bg-primary: #0a0a0f;
        --bg-secondary: #1a1a2e;
        --bg-card: #1e1e2e;

        --text-primary: #ffffff;
        --text-secondary: #a1a1aa;

        --gradient-primary: linear-gradient(135deg, var(--primary-color), var(--accent-color));

        --font-primary: "Orbitron", monospace;
        --font-secondary: "Rajdhani", sans-serif;

        --shadow-glow: 0 0 20px rgba(0, 245, 255, 0.5);

        --transition: 0.3s ease;
      }

      /* BODY */
      body {
        height: 100vh;
        overflow: hidden;
        background: var(--bg-primary);
        font-family: var(--font-secondary);
        color: var(--text-primary);
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
      }

      /* ANIMATED BACKGROUND */
      .background-animation {
        position: absolute;
        inset: 0;
        z-index: 0;
      }

      .floating-particles {
        position: absolute;
        width: 100%;
        height: 100%;
        background:
          radial-gradient(circle at 20% 80%, rgba(0, 245, 255, 0.12) 0%, transparent 50%),
          radial-gradient(circle at 80% 20%, rgba(255, 0, 110, 0.12) 0%, transparent 50%),
          radial-gradient(circle at 50% 50%, rgba(139, 92, 246, 0.12) 0%, transparent 50%);
        animation: float 12s ease-in-out infinite;
      }

      .grid-overlay {
        position: absolute;
        width: 100%;
        height: 100%;
        background-image:
          linear-gradient(rgba(0, 245, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 245, 255, 0.03) 1px, transparent 1px);

        background-size: 50px 50px;
        animation: gridMove 15s linear infinite;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }

        50% {
          transform: translateY(-25px);
        }
      }

      @keyframes gridMove {
        0% {
          transform: translate(0, 0);
        }

        100% {
          transform: translate(50px, 50px);
        }
      }

      /* CARD */
      .error-card {
        position: relative;
        z-index: 5;

        width: 90%;
        max-width: 700px;

        background: rgba(30, 30, 46, 0.82);

        backdrop-filter: blur(12px);

        border: 1px solid rgba(0, 245, 255, 0.15);

        border-radius: 24px;

        padding: 60px;

        text-align: center;

        box-shadow:
          0 0 30px rgba(0, 245, 255, 0.12),
          inset 0 0 20px rgba(255, 255, 255, 0.02);

        overflow: hidden;
      }

      /* TOP GLOW */
      .error-card::before {
        content: "";

        position: absolute;

        top: 0;
        left: -100%;

        width: 100%;
        height: 100%;

        background: linear-gradient(90deg, transparent, rgba(0, 245, 255, 0.08), transparent);

        animation: shine 5s infinite;
      }

      @keyframes shine {
        0% {
          left: -100%;
        }

        100% {
          left: 100%;
        }
      }

      /* 404 */
      .error-code {
        font-family: var(--font-primary);

        font-size: 140px;

        font-weight: 900;

        color: var(--primary-color);

        line-height: 1;

        text-shadow:
          0 0 20px rgba(0, 245, 255, 0.7),
          0 0 40px rgba(0, 245, 255, 0.4);

        animation: glitch 2.5s infinite;
      }

      /* GLITCH */
      @keyframes glitch {
        0%,
        100% {
          transform: translate(0);
        }

        20% {
          transform: translate(-2px, 2px);
        }

        40% {
          transform: translate(-2px, -2px);
        }

        60% {
          transform: translate(2px, 2px);
        }

        80% {
          transform: translate(2px, -2px);
        }
      }

      /* TITLE */
      .title {
        margin-top: 10px;

        font-family: var(--font-primary);

        font-size: 38px;

        color: var(--text-primary);

        text-transform: uppercase;

        letter-spacing: 3px;
      }

      /* SUBTITLE */
      .subtitle {
        margin-top: 20px;

        color: var(--text-secondary);

        font-size: 20px;

        line-height: 1.7;
      }

      /* DIVIDER */
      .divider {
        width: 220px;
        height: 2px;

        margin: 35px auto;

        background: var(--gradient-primary);

        box-shadow: var(--shadow-glow);
      }

      /* BUTTON */
      .btn {
        display: inline-flex;

        align-items: center;
        justify-content: center;

        padding: 14px 34px;

        border: none;

        border-radius: 12px;

        text-decoration: none;

        font-family: var(--font-secondary);

        font-weight: 700;

        text-transform: uppercase;

        letter-spacing: 1px;

        background: var(--gradient-primary);

        color: var(--text-primary);

        transition: var(--transition);

        box-shadow: 0 4px 20px rgba(0, 245, 255, 0.25);
      }

      .btn:hover {
        transform: translateY(-3px);

        box-shadow: 0 8px 35px rgba(0, 245, 255, 0.45);
      }

      /* FOOTER */
      .footer {
        margin-top: 35px;

        color: #666;

        font-size: 13px;

        letter-spacing: 2px;
      }

      /* RESPONSIVE */
      @media (max-width: 768px) {
        .error-card {
          padding: 40px 25px;
        }

        .error-code {
          font-size: 90px;
        }

        .title {
          font-size: 26px;
        }

        .subtitle {
          font-size: 16px;
        }
      }
    </style>
  </head>

  <body>
    <!-- BG -->
    <div class="background-animation">
      <div class="floating-particles"></div>
      <div class="grid-overlay"></div>
    </div>

    <!-- CARD -->
    <div class="error-card">
      <div class="error-code">NOPE</div>

      <div class="title">ACCESS DENIED</div>

      <div class="subtitle">
        Wrong password detected.<br />
        Authentication failed.
      </div>

      <div class="divider"></div>

      <a href="index.html" class="btn"> Return </a>

      <div class="footer">SYSTEM SECURITY ACTIVE</div>
    </div>
  </body>
</html>
